<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>My Wallet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div class="card">
    <img src="my wallet logo.PNG.PNG" class="logo">
    <h2>My Wallet</h2>

    <input id="username" placeholder="Usuario">
    <input id="pin" type="password" placeholder="Código">

    <button onclick="login()">Entrar</button>
    <button onclick="createUser()">Crear usuario</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="topbar">
    <img src="my wallet logo.PNG.PNG" class="logo-small">
    <button onclick="logout()">Salir</button>
  </div>

  <div class="card balance">
    <h1 id="total">€0</h1>
    <p>Total balance</p>
  </div>

  <div id="wallet" class="wallet"></div>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="action" onclick="openBuy()">💰<span>Buy</span></div>
    <div class="action" onclick="openSell()">💸<span>Sell</span></div>
    <div class="action" onclick="openTransfer()">🔁<span>Send</span></div>
  </div>

  <!-- BANCO -->
  <div class="center">
    <button class="btn-blue" onclick="openBank()">🏦 Banco</button>
  </div>

  <!-- ACTION PANEL -->
  <div id="actionPanel" class="card hidden">
    <h3 id="actionTitle"></h3>

    <select id="coinSelect">
      <option>BTC</option>
      <option>ETH</option>
      <option>USDT</option>
    </select>

    <input id="amountInput" placeholder="Cantidad">
    <input id="toUser" placeholder="Usuario destino" class="hidden">

    <button class="btn-blue" onclick="confirmAction()">Confirmar</button>
    <button onclick="closeAction()">Cancelar</button>
  </div>

  <!-- ADMIN -->
  <div id="adminPanel" class="hidden">
    <h3>Admin</h3>
    <div id="usersList"></div>
  </div>

</div>

<!-- BANCO SELECT -->
<div id="bankSelectScreen" class="center hidden">
  <div class="card">
    <h2>Selecciona banco</h2>

    <div class="grid">
      <div class="bank" onclick="selectBank(this,'BBVA')"><img src="bbva.png"></div>
      <div class="bank" onclick="selectBank(this,'Santander')"><img src="santander.png"></div>
      <div class="bank" onclick="selectBank(this,'ING')"><img src="ing.png"></div>
      <div class="bank" onclick="selectBank(this,'Caixa')"><img src="caixa.png"></div>
      <div class="bank" onclick="selectBank(this,'Ibercaja')"><img src="ibercaja.png"></div>
      <div class="bank" onclick="selectBank(this,'Cajamar')"><img src="cajamar.png"></div>
      <div class="bank" onclick="selectBank(this,'Kutxa')"><img src="kutxa.png"></div>
      <div class="bank" onclick="selectBank(this,'Bankinter')"><img src="bankinter.png"></div>
      <div class="bank" onclick="selectBank(this,'Sabadell')"><img src="sabadell.png"></div>
    </div>

    <button onclick="closeBank()">Volver</button>
  </div>
</div>

<!-- BANK LOGIN -->
<div id="bankLoginScreen" class="center hidden">
  <div class="card">
    <h2 id="bankTitle">Banco</h2>

    <input id="bankUser" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">

    <button class="btn-blue" onclick="connectBank()">Conectar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
