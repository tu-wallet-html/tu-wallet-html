<!DOCTYPE html>
<html>
<head>
  <title>My Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <img src="my wallet logo.PNG.PNG" class="logo">
  <h2 id="title">Iniciar sesión</h2>

  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="pin" placeholder="Código">

  <button onclick="login()">Entrar</button>
  <button onclick="createUser()">Crear usuario</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="header">
    <img src="my wallet logo.PNG.PNG" class="logo-small">
    <div>
      <button onclick="toggleLang()">🌍</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="balance">
    <h1 id="total">$0</h1>
  </div>

  <div id="wallet"></div>

  <div class="actions">
    <button onclick="openBank()">🏦 Banco</button>
  </div>

  <div class="card" id="history"></div>

  <!-- ADMIN -->
  <div id="adminPanel" class="card" style="display:none;">
    <h3>Admin Panel</h3>
    <div id="usersList"></div>
  </div>

</div>

<!-- BANCO -->
<div id="bankScreen" style="display:none;" class="card">

  <h2>Banco</h2>

  <input id="bankName" placeholder="Banco">
  <input id="iban" placeholder="IBAN">
  <input id="dni" placeholder="DNI">

  <input id="withdrawAmount" placeholder="Cantidad">

  <button class="blue" onclick="withdrawFromBank()">Retirar</button>
  <button onclick="closeBank()">Volver</button>

</div>

<script src="script.js"></script>
</body>
</html>
