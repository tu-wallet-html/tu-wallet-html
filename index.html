<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>My Wallet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div class="card login-card">

    <img src="my wallet logo.PNG.PNG" class="logo">

    <h2>Iniciar sesión</h2>

    <input id="username" placeholder="Usuario">
    <input id="pin" type="password" placeholder="Código">

    <button class="btn-main" onclick="login()">Entrar</button>
    <button onclick="createUser()">Crear usuario</button>

  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="top">
    <img src="my wallet logo.PNG.PNG" class="logo-small">
    <button onclick="logout()">Salir</button>
  </div>

  <h1 id="total">$0</h1>

  <div id="wallet"></div>

  <div class="center">
    <button class="btn-blue" onclick="openBank()">🏦 Banco</button>
  </div>

  <div id="adminPanel" class="hidden">
    <h3>ADMIN</h3>
    <div id="usersList"></div>
  </div>

</div>

<!-- SELECTOR BANCO -->
<div id="bankSelectScreen" class="center hidden">
  <div class="card">

    <h2>Selecciona tu banco</h2>

    <div class="grid">

      <div onclick="selectBank(this,'BBVA')" class="bank">
        <img src="bbva.png">
      </div>

      <div onclick="selectBank(this,'Santander')" class="bank">
        <img src="santander.png">
      </div>

      <div onclick="selectBank(this,'ING')" class="bank">
        <img src="ing.png">
      </div>

      <div onclick="selectBank(this,'Caixa')" class="bank">
        <img src="caixa.png">
      </div>

      <div onclick="selectBank(this,'Ibercaja')" class="bank">
        <img src="ibercaja.png">
      </div>

      <div onclick="selectBank(this,'Cajamar')" class="bank">
        <img src="cajamar.png">
      </div>

      <div onclick="selectBank(this,'Kutxa')" class="bank">
        <img src="kutxa.png">
      </div>

      <div onclick="selectBank(this,'Bankinter')" class="bank">
        <img src="bankinter.png">
      </div>

      <div onclick="selectBank(this,'Sabadell')" class="bank">
        <img src="sabadell.png">
      </div>

    </div>

    <button onclick="closeBank()">Volver</button>

  </div>
</div>

<!-- LOGIN BANCO -->
<div id="bankLoginScreen" class="center hidden">
  <div class="card">

    <h2 id="bankTitle">Banco</h2>

    <input id="bankUser" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">

    <button class="btn-blue" onclick="connectBank()">Conectar</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
