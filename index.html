<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- LOGIN -->
    <div class="card" id="loginCard">
      <h2>🔐 Acceso</h2>
      <input type="text" id="dni" placeholder="DNI">
      <input type="password" id="password" placeholder="Contraseña">
      <button onclick="login()">Entrar</button>
    </div>

    <!-- APP -->
    <div id="walletApp" style="display:none;">

      <!-- USER -->
      <div class="card">
        <h2 id="userText"></h2>
        <button onclick="logout()">Cerrar sesión</button>
      </div>

      <!-- BALANCE TOTAL -->
      <div class="card balance-card">
        <h2>💰 Balance total</h2>
        <div class="balance-amount" id="total">€0</div>
      </div>

      <!-- CRYPTO LIST -->
      <div class="card">
        <div class="crypto-item">
          <span class="crypto-name">BTC</span>
          <span class="crypto-value" id="btc">0</span>
        </div>

        <div class="crypto-item">
          <span class="crypto-name">ETH</span>
          <span class="crypto-value" id="eth">0</span>
        </div>

        <div class="crypto-item">
          <span class="crypto-name">USDT</span>
          <span class="crypto-value" id="usdt">0</span>
        </div>

        <div class="crypto-item">
          <span class="crypto-name">BNB</span>
          <span class="crypto-value" id="bnb">0</span>
        </div>
      </div>

      <!-- OPERACIONES -->
      <div class="card">
        <h2>Operaciones</h2>

        <select id="crypto">
          <option value="BTC">Bitcoin (BTC)</option>
          <option value="ETH">Ethereum (ETH)</option>
          <option value="USDT">Tether (USDT)</option>
          <option value="BNB">BNB</option>
        </select>

        <input type="number" id="amount" placeholder="Cantidad">

        <button onclick="addMoney()">➕ Agregar</button>
        <button onclick="removeMoney()">➖ Quitar</button>
      </div>

      <!-- HISTORIAL -->
      <div class="card">
        <h2>📊 Historial</h2>
        <ul id="history"></ul>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
