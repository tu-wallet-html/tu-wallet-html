<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Wallet Crypto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <div class="card" id="loginCard">
      <h2>🔐 Iniciar sesión</h2>
      <input type="text" id="username" placeholder="Escribe tu usuario">
      <button onclick="login()">Entrar</button>
    </div>

    <div id="walletApp" style="display: none;">
      <div class="card top-card">
        <p class="label">Usuario</p>
        <h2 id="welcomeUser">Hola</h2>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
      </div>

      <div class="card top-card">
        <p class="label">Balance total</p>
        <h1 id="balance">$0</h1>
      </div>

      <div class="card action-card">
        <h2>Operaciones</h2>

        <select id="crypto">
          <option value="BTC">Bitcoin (BTC)</option>
          <option value="ETH">Ethereum (ETH)</option>
          <option value="USDT">Tether (USDT)</option>
          <option value="BNB">BNB</option>
        </select>

        <input type="number" id="amount" placeholder="Cantidad">

        <div class="buttons">
          <button onclick="addMoney()">➕ Agregar</button>
          <button onclick="removeMoney()">➖ Quitar</button>
        </div>
      </div>

      <div class="card history-card">
        <h2>📊 Historial</h2>
        <ul id="history"></ul>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
