<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>My Wallet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="center-screen">
  <div class="login-box">
    <img src="my wallet logo.PNG.PNG" class="logo-big">
    <h2>Iniciar sesión</h2>

    <input id="username" placeholder="Usuario">
    <input id="pin" type="password" placeholder="Código">

    <button class="btn-main" onclick="login()">Entrar</button>
    <button onclick="createUser()">Crear usuario</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="topbar">
    <img src="my wallet logo.PNG.PNG" class="logo-small">

    <div>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <h1 id="total">$0</h1>

  <div id="wallet"></div>

  <div class="center">
    <button class="btn-blue" onclick="openBank()">🏦 Banco</button>
  </div>

  <div id="history"></div>

  <div id="adminPanel" class="hidden">
    <h3>ADMIN</h3>
    <div id="usersList"></div>
  </div>

</div>

<!-- SELECTOR BANCO -->
<div id="bankSelectScreen" class="center-screen hidden">
  <div class="bank-box">

    <h2>Selecciona banco</h2>

    <div class="bank-grid">

      <div onclick="selectBank('BBVA')" class="bank-item">
        <img src="bbva.png">
      </div>

      <div onclick="selectBank('Santander')" class="bank-item">
        <img src="santander.png">
      </div>

      <div onclick="selectBank('ING')" class="bank-item">
        <img src="ing.png">
      </div>

      <div onclick="selectBank('CaixaBank')" class="bank-item">
        <img src="caixa.png">
      </div>

      <div onclick="selectBank('Ibercaja')" class="bank-item">
        <img src="ibercaja.png">
      </div>

      <div onclick="selectBank('Cajamar')" class="bank-item">
        <img src="cajamar.png">
      </div>

      <div onclick="selectBank('Kutxabank')" class="bank-item">
        <img src="kutxa.png">
      </div>

      <div onclick="selectBank('Bankinter')" class="bank-item">
        <img src="bankinter.png">
      </div>
      <div onclick="selectBank('Sabadell')" class="bank-item">
        <img src="sabadell.png">
      </div>
    </div>

    <button onclick="closeBank()">Volver</button>

  </div>
</div>

<!-- LOGIN BANCO -->
<div id="bankLoginScreen" class="center-screen hidden">
  <div class="bank-box">

    <h2 id="bankTitle">Banco</h2>

    <input id="bankUser" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">

    <input id="iban" placeholder="IBAN">
    <input id="dni" placeholder="DNI">

    <button class="btn-blue" onclick="connectBank()">Conectar</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
