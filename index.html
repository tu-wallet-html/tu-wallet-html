<!DOCTYPE html>
<html>
<head>
  <title>My Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <img src="my wallet logo.PNG" class="logo">
  <h2>Iniciar sesión</h2>

  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="pin" placeholder="Código de acceso">

  <button onclick="login()">Entrar</button>

  <button onclick="createUser()">Crear usuario</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="header">
    <img src="my wallet logo.PNG" class="logo-small">
    <button onclick="logout()">Salir</button>
  </div>

  <!-- BALANCE -->
  <div class="balance">
    <h1 id="total">$0</h1>
  </div>

  <!-- WALLET -->
  <div id="wallet"></div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="addMoney()">Agregar</button>
    <button onclick="withdrawMoney()">Retirar</button>
  </div>

  <!-- BANCO -->
  <div class="card">
    <h3>Banco</h3>
    <input id="bankName" placeholder="Banco">
    <input id="iban" placeholder="IBAN">
    <button onclick="saveBank()">Guardar</button>
  </div>

  <!-- VERIFICACION -->
  <div class="card">
    <h3>Verificación</h3>
    <input type="file" id="dni">
    <input type="file" id="selfie">
    <button onclick="submitVerification()">Enviar</button>
    <p id="verifyStatus"></p>
  </div>

  <!-- HISTORIAL -->
  <div class="card" id="history"></div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="card" style="display:none;">
    <h3>Admin Panel</h3>
    <div id="usersList"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
