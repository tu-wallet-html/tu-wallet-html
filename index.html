<!DOCTYPE html>
<html>
<head>
  <title>Mi Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
  <h2>🔐 Iniciar sesión</h2>

  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="pin" placeholder="Código (0404)">

  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar"></div>
    <div class="search">🔍</div>
    <div class="icons">
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <!-- BALANCE -->
  <div class="balance">
    <p>Balance</p>
    <h1 id="balance">$0</h1>
    <button>Accounts</button>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <div onclick="addMoney()">➕<p>Add</p></div>
    <div onclick="withdrawMoney()">⬇️<p>Withdraw</p></div>
    <div>ℹ️<p>Info</p></div>
    <div>⋯<p>More</p></div>
  </div>

  <!-- HISTORIAL -->
  <div class="card" id="history"></div>

</div>

<script src="script.js"></script>
</body>
</html>
