<!DOCTYPE html>
<html>
<head>
  <title>Mi Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="avatar"></div>

    <div class="search">🔍</div>

    <div class="icons">📊 💳</div>
  </div>

  <!-- BALANCE -->
  <div class="balance">
    <p>Balance</p>
    <h1 id="balance">$0</h1>
    <button>Accounts</button>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <div onclick="addMoney()">➕<p>Add</p></div>
   <div onclick="withdrawMoney()">⬇️<p>Withdraw</p></div>
    <div>ℹ️<p>Info</p></div>
    <div>⋯<p>More</p></div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="item">
      <span>🏠 House bills</span>
      <span>-$50</span>
    </div>

    <div class="item">
      <span>🏋️ Gym</span>
      <span>-$10</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
